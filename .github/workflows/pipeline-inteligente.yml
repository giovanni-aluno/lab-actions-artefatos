name: pipeline-inteligente

on:
  # Regra 1: Execução manual
  workflow_dispatch:

  # Regra 2: Execução diária às 02:00 (UTC-3 → 05:00 UTC)
  schedule:
    - cron: '0 5 * * *'

  # Regra 3 + 4: Push controlado
  push:
    branches:
      - 'feature/*'
    paths:
      - 'src/**'
      - '!src/docs/**'

jobs:
  job_gerador:
    name: Gerador de Artefatos
    runs-on: ubuntu-latest

    steps:
      - name: Simular build e gerar relatórios
        run: |
          mkdir -p saida_build
          echo "Relatório 1 gerado em $(date)" > saida_build/relatorio1.txt
          echo "Relatório 2 gerado em $(date)" > saida_build/relatorio2.txt

      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/

  job_auditoria:
    name: Auditoria dos Artefatos
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Download dos artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: .

      - name: Listar estrutura de arquivos
        run: ls -R

      - name: Exibir conteúdo do relatório
        run: cat relatorio1.txt